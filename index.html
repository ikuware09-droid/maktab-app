<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مکتب دار الھدیٰ ناگوٹھانہ</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --cream:#F7F4EC;
  --emerald-deep:#0B4D3A;
  --emerald:#117860;
  --emerald-light:#1C8C6B;
  --gold:#B8862C;
  --gold-light:#E3C16B;
  --ink:#16241D;
  --muted:#7C8B82;
  --coral:#D9614C;
  --rose:#BE1A60;
  --petrol:#1C6E89;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', 'Segoe UI', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  direction: rtl;
  color: var(--ink);
}

.urdu{font-family:'Noto Nastaliq Urdu', serif;}
.mono{font-family:'JetBrains Mono', monospace;}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(155deg, var(--emerald-deep) 0%, var(--emerald) 55%, var(--emerald-light) 100%);
  color: white;
  text-align: center;
  padding: 26px 18px 50px;
  position: relative;
  overflow: hidden;
}
.header .pattern{
  position:absolute; inset:0; opacity:0.07;
  background-image: radial-gradient(circle at 1px 1px, var(--gold-light) 1px, transparent 1.6px);
  background-size: 22px 22px;
}
.header-content{ position:relative; z-index:2; }

.header-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 4px;
}

.logo-circle {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 27px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.28), 0 0 0 4px rgba(255,255,255,0.12);
  flex-shrink: 0;
}

.header h1 {
  font-size: 19px;
  font-weight: 700;
  line-height: 1.3;
}

.header p {
  font-size: 11.5px;
  opacity: 0.75;
  margin-top: 2px;
  letter-spacing: 0.5px;
  font-family: 'Outfit', sans-serif;
}

.batch-row {
  display: flex;
  justify-content: center;
  gap: 7px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.batch-row span {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(227,193,107,0.5);
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 11px;
  backdrop-filter: blur(4px);
}

#installBtn {
  margin-top: 12px;
  background: var(--gold);
  color: white;
  border: none;
  padding: 7px 18px;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
  font-size: 12px;
  display: none;
  position: relative; z-index: 2;
}

.curve-svg{ position:absolute; bottom:-1px; left:0; width:100%; display:block; }

/* ===== FLOATING GLASS STAT BAR ===== */
.float-bar{
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  margin: -38px 18px 0;
  padding: 16px 10px;
  display: flex;
  box-shadow: 0 14px 30px rgba(11,77,58,0.18);
  position: relative; z-index: 3;
}
.float-stat{ flex:1; text-align:center; border-right:1px solid #e7e2d4; }
.float-stat:last-child{ border-right:none; }
.float-stat .num{ font-size:19px; font-weight:600; color:var(--emerald-deep); }
.float-stat .lbl{ font-size:10px; color:var(--muted); margin-top:2px; }

/* ===== SECTION TITLE ===== */
.section-title{
  margin: 26px 16px 10px; display:flex; align-items:center; gap:10px;
}
.eyebrow{ font-size:11px; letter-spacing:1px; color:var(--gold); font-weight:600; white-space:nowrap; }
.section-title::after{ content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--gold-light), transparent); }

/* ===== HOME GRID ===== */
.home-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 13px;
  padding: 4px 18px 15px;
}

.tile {
  background: #fff;
  border-radius: 18px;
  padding: 18px 8px 14px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(11,77,58,0.07);
  border: 1px solid #f1ede2;
  transition: transform 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.tile:active { transform: scale(0.96); }

.tile-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin: 0 auto;
}

.tile-label { font-size: 12.5px; font-weight: 500; color: var(--ink); line-height: 1.3; }

.tile-green .tile-icon{ background:linear-gradient(160deg,#1C8C6B,#0B4D3A); box-shadow:0 4px 10px rgba(11,77,58,.35); }
.tile-blue .tile-icon{ background:linear-gradient(160deg,#3aa0bd,#1C6E89); box-shadow:0 4px 10px rgba(28,110,137,.35); }
.tile-orange .tile-icon{ background:linear-gradient(160deg,#f0b35e,#c97f1f); box-shadow:0 4px 10px rgba(201,127,31,.35); }
.tile-gold .tile-icon{ background:linear-gradient(160deg,#e08363,#C0613C); box-shadow:0 4px 10px rgba(192,97,60,.35); }
.tile-purple .tile-icon{ background:linear-gradient(160deg,#9a6bab,#7A4B8C); box-shadow:0 4px 10px rgba(122,75,140,.35); }
.tile-teal .tile-icon{ background:linear-gradient(160deg,#3aa896,#1E8C7C); box-shadow:0 4px 10px rgba(30,140,124,.35); }
.tile-pink .tile-icon{ background:linear-gradient(160deg,#e0508a,#BE1A60); box-shadow:0 4px 10px rgba(190,26,96,.35); }

/* ===== DATE BANNER ===== */
.date-banner {
  background: var(--emerald-deep);
  color: var(--gold-light);
  padding: 10px 15px;
  font-weight: 600;
  font-size: 13px;
  text-align: center;
  margin: 14px 18px;
  border-radius: 12px;
  direction: ltr;
}

/* ===== CARDS ===== */
.card {
  background: #fff;
  margin: 14px 18px;
  padding: 18px 18px 14px;
  border-radius: 20px;
  box-shadow: 0 8px 22px rgba(11,77,58,0.07);
  border: 1px solid #f1ede2;
}

/* ===== STAT GRID (dashboard top numbers) ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 16px 18px 4px;
}

.stat-card {
  text-align: center;
  margin: 0;
  border-radius: 18px;
  padding: 16px 10px;
  background: #fff;
  box-shadow: 0 6px 16px rgba(11,77,58,0.07);
  border: 1px solid #f1ede2;
  border-top: 3px solid var(--emerald);
}
.stat-icon { font-size: 22px; }
.stat-num { font-size: 24px; font-weight: 700; color: var(--emerald-deep); font-family:'JetBrains Mono'; margin-top:4px; }
.stat-label { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.green-card{ border-top-color: var(--emerald-light); }
.red-card{ border-top-color: var(--coral); }
.blue-card{ border-top-color: var(--petrol); }

.loading { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 15px; }

/* ===== BUTTONS ===== */
.btn-primary {
  background: linear-gradient(135deg, var(--emerald), var(--emerald-light));
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  font-weight: 600;
}

.btn-cancel {
  background: #eee9dc;
  color: #5c655e;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  margin-top: 5px;
}

.btn-delete {
  background: #fbe6e2;
  color: var(--coral);
  border: 1px solid var(--coral);
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  flex-shrink: 0;
}

.input-field {
  width: 100%;
  padding: 11px 12px;
  margin: 5px 0;
  border: 1.5px solid #e7e2d4;
  border-radius: 10px;
  font-size: 14px;
  display: block;
  background: #fbfaf5;
  direction: rtl;
  font-family: 'Outfit', sans-serif;
}
.input-field:focus { outline: none; border-color: var(--emerald); }

/* ===== TALABA ===== */
.batch-header {
  background: var(--emerald);
  color: white;
  padding: 8px 15px;
  font-weight: 600;
  font-size: 13px;
  margin-top: 8px;
  border-radius: 10px;
  margin-inline: 18px;
}

.student-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.student-info { display: flex; align-items: center; gap: 12px; flex: 1; }

.student-avatar {
  background: linear-gradient(160deg, var(--emerald-light), var(--emerald-deep));
  color: white;
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 18px;
  flex-shrink: 0;
}

.batch-badge {
  background: #e8f2ec;
  color: var(--emerald-deep);
  padding: 2px 9px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}

/* ===== HAAZRI ===== */
.haazri-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 15px;
  margin: 5px 15px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 4px 12px rgba(11,77,58,0.06);
  gap: 10px;
  border: 1px solid #f1ede2;
}

.student-name { font-weight: 500; font-size: 14px; flex: 1; }

.att-buttons { display: flex; gap: 6px; }

.btn-present {
  background: #eef8f3;
  color: var(--emerald);
  border: 2px solid var(--emerald-light);
  padding: 7px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}

.btn-absent {
  background: #fdf1ef;
  color: var(--coral);
  border: 2px solid var(--coral);
  padding: 7px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}

.active-green { background: var(--emerald-light); color: white; }
.active-red { background: var(--coral); color: white; }

.btn-batch-change{
  background:#fbfaf5; border:1px solid #e7e2d4; border-radius:10px; color:var(--muted);
}

/* ===== FEES ===== */
.fees-card { margin-bottom: 8px; }

.months-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 5px;
  margin-top: 10px;
  direction: ltr;
}

.month-btn {
  padding: 7px 2px;
  border: none;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
}

.paid { background: var(--emerald-light); color: white; }
.unpaid { background: #eee9dc; color: #a8a193; }

/* ===== PROGRESS ===== */
.progress-bar {
  background: #eee9dc;
  border-radius: 10px;
  height: 22px;
  overflow: hidden;
  direction: ltr;
}

.progress-fill {
  height: 100%;
  border-radius: 10px;
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono';
  transition: width 0.5s;
}

/* ===== PROFILE ===== */
.profile-avatar {
  background: linear-gradient(160deg, var(--emerald-light), var(--emerald-deep));
  color: white;
  width: 72px; height: 72px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 30px;
  margin: 0 auto 10px;
  box-shadow: 0 6px 16px rgba(11,77,58,0.25);
}

.profile-stats {
  display: flex;
  justify-content: space-around;
  margin: 15px 0;
  direction: ltr;
  gap: 8px;
}

.pstat {
  text-align: center;
  border: 2px solid;
  border-radius: 14px;
  padding: 10px 14px;
  min-width: 70px;
}

.pstat-num { font-size: 19px; font-weight: 700; font-family: 'JetBrains Mono'; }
.pstat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

.fee-months-row { display: flex; flex-wrap: wrap; gap: 5px; direction: ltr; }

.fee-month {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
}

.att-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px dotted #e3ddcd;
  font-size: 13px;
  direction: ltr;
}

.status-present { color: var(--emerald); font-weight: 700; }
.status-absent { color: var(--coral); font-weight: 700; }

.btn-share {
  background: #25D366;
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  flex: 1;
  font-weight: 600;
}

.btn-print {
  background: var(--petrol);
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  flex: 1;
  font-weight: 600;
}

.btn-monthly {
  background: var(--rose);
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  flex: 1;
  font-weight: 600;
}

/* ===== BATCH STAT (ledger style via existing classnames) ===== */
.batch-stat-card { border-top: 3px solid var(--emerald); margin: 10px 18px; }
.batch-stat-title { font-weight: 700; color: var(--emerald-deep); font-size: 14px; margin-bottom: 10px; }
.batch-stat-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; padding: 7px 0; border-bottom: 1px dotted #e3ddcd; direction: ltr; }
.batch-total { color: #5c655e; font-size: 13px; }
.batch-present { color: var(--emerald); font-size: 13px; font-weight: 700; font-family:'JetBrains Mono'; }
.batch-absent { color: var(--coral); font-size: 13px; font-weight: 700; font-family:'JetBrains Mono'; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--emerald-deep);
  color: white;
  padding: 12px 24px;
  border-radius: 25px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ===== PRINT ===== */
@media print {
  .header, button, .float-bar { display: none !important; }
  .card { box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>
<body>

<header class="header">
  <div class="pattern"></div>
  <div class="header-content">
    <div class="header-top">
      <div class="logo-circle">🕌</div>
      <div>
        <h1 class="urdu">مکتب دار الھدیٰ ناگوٹھانہ</h1>
        <p>NAGOTHANE · MAHARASHTRA</p>
      </div>
    </div>
    <div class="batch-row urdu">
      <span>پہلی: 8-7</span>
      <span>دوسری: 3-2</span>
      <span>تیسری: مغرب-عشاء</span>
    </div>
    <button id="installBtn">📲 Install App</button>
  </div>
  <svg class="curve-svg" viewBox="0 0 400 40" preserveAspectRatio="none" height="40">
    <path d="M0,40 C100,0 300,0 400,40 Z" fill="#F7F4EC"/>
  </svg>
</header>

<main id="app"><div class="loading">⏳ Loading...</div></main>

<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
